<!DOCTYPE html>
<html>
<head>
  <title>HLS Downloader</title>
  <style>
    body {
      font-family: Arial;
      display: flex;
      justify-content: center;
      align-items: center;
      height: 100vh;
      background: #111;
      color: white;
    }
    .container {
      text-align: center;
      background: #1e1e1e;
      padding: 30px;
      border-radius: 12px;
    }
    input {
      width: 300px;
      padding: 10px;
      border-radius: 6px;
      border: none;
      margin-bottom: 10px;
    }
    button {
      padding: 10px 20px;
      border: none;
      border-radius: 6px;
      background: #4CAF50;
      color: white;
      cursor: pointer;
    }
  </style>
</head>
<body>
  <div class="container">
    <h2>HLS Downloader</h2>
    <input id="url" placeholder="Enter m3u8 URL" />
    <br/>
    <button onclick="download()">Download</button>
    <p id="status"></p>
  </div>

  <script>
    async function download() {
      const url = document.getElementById("url").value;
      const status = document.getElementById("status");

      status.innerText = "Processing...";

      const res = await fetch('/api/download', {
        method: 'POST',
        headers: { 'Content-Type': 'application/json' },
        body: JSON.stringify({ url })
      });

      if (!res.ok) {
        status.innerText = "Error occurred";
        return;
      }

      const blob = await res.blob();
      const downloadUrl = window.URL.createObjectURL(blob);

      const a = document.createElement('a');
      a.href = downloadUrl;
      a.download = 'video.ts';
      a.click();

      status.innerText = "Download complete";
    }
  </script>
</body>
</html>
